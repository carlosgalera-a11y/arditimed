name: Deploy Functions

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    if: github.repository == 'carlosgalera-a11y/Cartagenaeste'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json
      - name: Install functions deps
        run: npm --prefix functions ci
      - name: Build functions
        run: npm --prefix functions run build
      - name: Unit tests
        run: npm --prefix functions test
      - name: Install firebase-tools
        run: npm install -g firebase-tools@latest
      - name: Deploy askAi Cloud Function
        env:
          # FIREBASE_SERVICE_ACCOUNT contiene el JSON completo de una
          # service account con rol "Cloud Functions Admin" + "Service
          # Account User" sobre el proyecto docenciacartagenaeste.
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # No usamos `set -e` para poder capturar errores de firebase-tools
          # y publicarlos en un gist (los logs de Actions están bloqueados
          # desde el sandbox de Claude Code).
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
            echo "[deploy] usando GOOGLE_APPLICATION_CREDENTIALS de service account"
            firebase deploy --only functions:askAi --project docenciacartagenaeste --non-interactive --force --debug 2>&1 | tee /tmp/deploy.log
            STATUS=${PIPESTATUS[0]}
          elif [ -n "$FIREBASE_TOKEN" ]; then
            echo "[deploy] usando FIREBASE_TOKEN (legacy)"
            firebase deploy --only functions:askAi --project docenciacartagenaeste --token "$FIREBASE_TOKEN" --non-interactive --force --debug 2>&1 | tee /tmp/deploy.log
            STATUS=${PIPESTATUS[0]}
          else
            echo "[deploy] ERROR: ni FIREBASE_SERVICE_ACCOUNT ni FIREBASE_TOKEN configurados en repo secrets" | tee /tmp/deploy.log
            STATUS=1
          fi

          # Sube los últimos 200 KB del log al repo en /tmp-debug-logs/
          # (rama debug/deploy-logs) usando GitHub Contents API. GITHUB_TOKEN
          # tiene scope contents:write por defecto, así que esto sí funciona.
          # Los logs de Actions están bloqueados desde el sandbox de Claude.
          tail -c 200000 /tmp/deploy.log > /tmp/deploy_tail.log || true
          LOG_PATH="tmp-debug-logs/run-${{ github.run_id }}.log"
          BRANCH="debug/deploy-logs"

          # 1) Asegurar que la rama existe (la creamos desde main si no).
          MAIN_SHA=$(curl -sS -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/${{ github.repository }}/git/ref/heads/main" | python3 -c "import sys,json; print(json.load(sys.stdin)['object']['sha'])")
          curl -sS -X POST -H "Authorization: token $GH_TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs" \
            -d "{\"ref\":\"refs/heads/$BRANCH\",\"sha\":\"$MAIN_SHA\"}" > /dev/null 2>&1 || true

          # 2) Subir el log codificado en base64 a esa rama.
          B64_CONTENT=$(base64 -w0 < /tmp/deploy_tail.log)
          BODY=$(python3 -c "
          import json
          print(json.dumps({
              'message': 'debug: deploy log run ${{ github.run_id }}',
              'content': '$B64_CONTENT',
              'branch': '$BRANCH',
          }))
          ")
          curl -sS -X PUT -H "Authorization: token $GH_TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/$LOG_PATH" \
            -d "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print('[deploy] log path:', d.get('content',{}).get('html_url') or d.get('message'))" | tee -a /tmp/deploy.log

          # Resumen visible en la página del run.
          echo "## Deploy askAi result" >> $GITHUB_STEP_SUMMARY
          echo "- Status: $STATUS (0=success)" >> $GITHUB_STEP_SUMMARY
          echo "- Log: \`$LOG_PATH\` en rama \`$BRANCH\`" >> $GITHUB_STEP_SUMMARY

          exit $STATUS

  sync-area2:
    name: Sync a repo del dominio custom
    needs: deploy-functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AREA2_PAT }}
      - name: Push a area2cartagena
        run: |
          git remote add area2 https://x-access-token:${{ secrets.AREA2_PAT }}@github.com/carlosgalera-a11y/area2cartagena.git
          TODAY=$(date +%F)
          git push area2 "HEAD:refs/heads/pre-sync-backup-${TODAY}-$(git rev-parse --short HEAD)" || true
          git push area2 HEAD:main --force-with-lease
